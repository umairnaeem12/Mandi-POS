name: Build Windows Desktop App

# Builds the Windows installer (.msi + .exe) for the Restaurant POS desktop app.
# Runs on a Windows cloud machine because Tauri cannot cross-compile Windows from macOS/Linux.
#
# Trigger it in two ways:
#   1. Manually  -> GitHub -> Actions tab -> "Build Windows Desktop App" -> Run workflow
#   2. On a tag  -> push a tag like  v0.1.0  and it builds automatically
#
# When it finishes, download the installer from the run's "Artifacts" section
# (or from the auto-created Release if you triggered it with a tag).

on:
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    tags:
      - "v*"                   # e.g. v0.1.0, v1.2.3

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build web frontend
        # Bake the live production backend URL into the desktop build so the
        # installed app connects to the real server on any network, not localhost/LAN.
        env:
          VITE_API_URL: https://d3lel790c2307j.cloudfront.net/api
          VITE_SOCKET_URL: https://d3lel790c2307j.cloudfront.net
        run: npm run build:web

      - name: Build Windows desktop bundle
        run: npm run build --workspace desktop

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # If triggered by a version tag, also attach the installers to a GitHub Release
      - name: Publish Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
