# Nginx reverse proxy for the Bukhari POS NestJS backend.
# Terminates TLS and proxies /api, /uploads and /socket.io to the Node app on :4000.
# Certbot (Let's Encrypt) will inject the ssl_certificate lines automatically
# when you run: sudo certbot --nginx -d api.yourdomain.com
#
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/bukhari-pos
#          sudo ln -s /etc/nginx/sites-available/bukhari-pos /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.yourdomain.com;   # <-- change to your backend subdomain

    # Max upload size for product/logo images
    client_max_body_size 10M;

    # WebSocket upgrade map is defined once globally (see /etc/nginx/nginx.conf http block):
    #   map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket support (socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts so idle websockets are not killed
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
