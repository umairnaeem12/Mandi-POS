# AWS Amplify Hosting build spec for the pos-web frontend (Vite React SPA).
# This lives at the repo root; Amplify runs it from the monorepo root so the
# npm workspaces install correctly, then builds only the pos-web workspace.
#
# In the Amplify console set these Environment variables (App settings > Environment variables):
#   VITE_API_URL     = https://api.yourdomain.com/api
#   VITE_SOCKET_URL  = https://api.yourdomain.com
# (VITE_SOCKET_URL is optional — the app derives it from VITE_API_URL — but set it to be explicit.)
#
# Also add a Rewrite rule in the Amplify console (Rewrites and redirects) so the
# SPA router works on refresh:
#   Source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>
#   Target: /index.html
#   Type:   200 (Rewrite)

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build:web
  artifacts:
    baseDirectory: apps/pos-web/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
